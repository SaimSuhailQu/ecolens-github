    <style>
      /* Leaflet specific fix for map container height */
      .leaflet-container {
        width: 100%;
        height: 100%;
        z-index: 10;
        background: #0f172a; /* matches slate-900 */
      }
      /* Custom Scrollbar for dashboard feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #475569; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; 
      }
    </style>
